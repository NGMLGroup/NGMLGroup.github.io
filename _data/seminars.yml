- title: "Toward a Dynamical Theory of Deep Learning: Coupled State-Parameter Dynamics and Time-Scale Interaction"
  speaker: "Lorenzo Livi"
  speaker_page: "https://sites.google.com/site/lorenzlivi/"
  affiliation: "OPIT - Open Institute of Technology"
  date: 08-05-2026
  time: "10:00"
  done: True
  description: "Modern deep learning systems exhibit complex dynamical behavior, yet a principled theory explaining how these dynamics shape learning and memory is still missing. This talk presents a research program toward a dynamical theory of deep learning based on the interaction between state and parameter dynamics in recurrent neural networks. I show how gating mechanisms induce lag-dependent effective learning rates that constrain temporal credit assignment, and introduce a learnability theory characterizing the maximum temporal horizon at which gradient signals remain detectable under heavy-tailed stochastic gradients. Finally, I discuss recent results linking these learning limits to the distribution of neuron-wise time scales emerging during training, whose geometry determines the temporal reach of learning."
  slides: "slides/sem4_dynamical_theory_of_deep_learning.pdf"
  recording: "https://youtu.be/vML_M8NkICE?list=PLGMXrbDNfqTxlTyk44tQCQEqxqgcIGXtV"
  photo: "figs/seminars/lorenzo_livi_2.png"
  photo_alt: "Lorenzo Livi giving a seminar on Dynamical Theory of Deep Learning"


- title: "Geometry of neural networks"
  speaker: "Marta Panizzut"
  speaker_page: "https://martapanizzut.github.io/"
  affiliation: "UiT The Arctic University of Norway"
  date: 24-04-2026
  time: "10:00"
  done: true
  description: "This seminar offers an overview of recent advancements in the geometric aspects of neural networks. Specifically, we will explore how concepts from discrete and tropical geometry can be utilized to describe the geometric complexity of neural networks. No particular prior knowledge of geometry is required."
  slides: "slides/sem3_Geometry_and_neural_networks.pdf"
  recording: "https://youtu.be/TE6QxYSC94E"
  photo: "figs/seminars/marta4.jpg"
  photo_alt: "Marta Panizzut giving a seminar on Geometry of Neural Networks"


- title: "From Neural Networks to Graph Neural Networks"
  speaker: "Antonio Longa"
  speaker_page: "https://antoniolonga.github.io/"
  affiliation: "UiT The Arctic University of Norway"
  date: 10-04-2026
  time: "10:00"
  done: true
  description: "This seminar introduces the transition from traditional neural networks to Graph Neural Networks (GNNs), highlighting the limitations of MLPs in modeling relational data. It presents graphs as a natural representation for such data and describes GNNs through the message passing paradigm. Key architectures, challenges, and current research directions, including spatio-temporal graph learning, are briefly discussed."
  slides: "slides/sem2_fromNNtoGNN.pdf"
  recording: "https://youtu.be/zpExNl2xInU"
  photo: "figs/seminars/Antonio_1.jpg"
  photo_alt: "Antonio Longa giving a seminar on GNN"

- title: "Sheaf Neural Networks"
  speaker: "Dionisia Naddeo"
  speaker_page: "https://fismed.uniroma2.it/staff/dionisia-naddeo/"
  affiliation: " University of Rome Tor Vergata, Italy"
  date: 27-03-2026
  time: "10:00"
  done: true
  description: "This seminar provides an accessible introduction to the mathematical concept of sheaves. We will focus in particular on sheaves defined on graphs, explaining their intuition and basic properties in a simple and approachable way. Building on this foundation, we will introduce Sheaf Neural Networks, a recent extension of Graph Neural Networks that uses sheaf structures."
  slides: "slides/sem1_SheafNeuralNetworks.pdf"
  recording:
  photo: "figs/seminars/dionisia_fig2.jpg"
  photo_alt: "Dionisia Naddeo giving a seminar on Sheaf Neural Networks"

